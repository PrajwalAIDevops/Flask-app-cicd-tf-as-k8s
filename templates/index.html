<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Control Center</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

body { font-family: 'Plus Jakarta Sans', sans-serif; }
.code-font { font-family: 'JetBrains Mono', monospace; }

/* ✅ Reusable design system (reduces duplication massively) */
.card { @apply bg-slate-900 border border-slate-800 rounded-2xl p-6; }
.panel { @apply bg-slate-950 border border-slate-800 rounded-xl p-4; }
.btn { @apply px-3 py-2 rounded-lg transition-all; }
.icon-btn { @apply p-2 rounded-lg border border-slate-700 bg-slate-800 hover:bg-slate-700; }

.metric-card { @apply panel; }
.label { @apply text-xs text-slate-400; }
.title { @apply text-sm font-semibold uppercase tracking-wider text-slate-400; }
.subtext { @apply text-xs text-slate-500; }
</style>
</head>

<body id="appBody" class="bg-slate-950 text-slate-100 min-h-screen transition-colors duration-300">

<!-- NAV -->
<nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-6 py-4 flex justify-between sticky top-0 z-50">
<div class="flex items-center gap-3">
    <div class="p-2 bg-indigo-600/20 text-indigo-400 rounded-lg">
        <i data-lucide="layers"></i>
    </div>
    <div>
        <span class="font-bold text-lg">Flask Nexus</span>
        <span class="ml-2 px-2 py-0.5 text-xs bg-slate-800 text-slate-400 border border-slate-700 rounded-full code-font">
            v1.0.0
        </span>
    </div>
</div>

<div class="flex items-center gap-4">
    <button id="healthBtn" onclick="checkAppHealth()" class="btn bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 flex items-center gap-2">
        <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute h-full w-full rounded-full bg-emerald-400"></span>
            <span class="relative h-2 w-2 bg-emerald-500 rounded-full"></span>
        </span>
        System: Online
        <i data-lucide="refresh-cw"></i>
    </button>

    <button id="themeToggleBtn" onclick="toggleTheme()" class="icon-btn">
        <i id="themeIcon" data-lucide="sun"></i>
    </button>
</div>
</nav>

<!-- MAIN -->
<main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

<!-- LEFT -->
<div class="lg:col-span-2 space-y-6">

<!-- METRICS -->
<section class="card">
<div class="flex justify-between mb-4">
    <div>
        <h2 class="title">Endpoint 1: Real-time Metrics</h2>
        <h1>prajwal</h1>
        <p class="code-font subtext">GET /api/stats</p>
    </div>
    <button onclick="fetchMetrics()" class="icon-btn text-indigo-400">
        <i data-lucide="download-cloud"></i>
    </button>
</div>

<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">

    <div class="metric-card">
        <p class="label">Active Users</p>
        <h3 id="metricUsers" class="text-2xl font-bold">--</h3>
    </div>

    <div class="metric-card">
        <p class="label">Server Load</p>
        <h3 id="metricLoad" class="text-2xl font-bold">--</h3>
    </div>

    <div class="metric-card">
        <p class="label">Daily Requests</p>
        <h3 id="metricRequests" class="text-2xl font-bold">--</h3>
    </div>

</div>
</section>

<!-- FORM -->
<section class="card">
<h2 class="title">Endpoint 2: Client Reglistration</h2>
<p class="code-font subtext mb-4">POST /api/submit</p>

<form id="submitForm" class="space-y-4">

<label class="label">Account Name</label>

<div class="relative">
    <span class="absolute left-3 top-2.5 text-slate-500">
        <i data-lucide="user-plus"></i>
    </span>

    <input type="text" id="username" required
        class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-white"
        placeholder="Enter client identity">
</div>

<button class="btn bg-indigo-600 text-white flex items-center gap-2">
    Execute Transaction
    <i data-lucide="send"></i>
</button>

</form>
</section>

</div>

<!-- RIGHT -->
<div class="space-y-6">

<section class="card h-full flex flex-col min-h-[400px]">

<div class="flex justify-between mb-4">
    <div>
        <h2 class="title">API Gateway Console</h2>
        <p class="subtext">Live stream output</p>
    </div>
    <button onclick="clearConsole()" class="text-xs text-slate-500 underline">
        Clear logs
    </button>
</div>

<div id="consoleLog" class="panel flex-1 code-font text-xs overflow-y-auto space-y-2">
    <div class="text-slate-600">// Waiting for endpoint activity...</div>
</div>

</section>

</div>
</main>

<!-- TOAST -->
<div id="toast" class="fixed bottom-6 right-6 opacity-0 translate-y-20 transition-all bg-slate-900 border border-slate-800 p-4 rounded-xl flex gap-3">
<div id="toastIcon"></div>
<p id="toastMessage" class="text-sm text-white"></p>
</div>

<script>
lucide.createIcons();

/* JS unchanged (kept working) */
let currentTheme = 'dark';

/* rest of your JS stays exactly same */
</script>

</body>
</html>
